mutation CreateConventionalCommitsRuleset($repositoryId: ID!) {
  createRepositoryRuleset(
    input: {
      repositoryId: $repositoryId
      name: "Enforce Conventional Commits"
      description: "Require conventional commit format (feat:, fix:, test:, docs:, chore:, refactor:)"
      enforcement: ACTIVE
      target: BRANCH
      bypassActors: []
      conditions: {
        refName: {
          include: ["refs/heads/*"]
          exclude: []
        }
      }
      rules: [
        {
          type: COMMIT_MESSAGE_PATTERN
          parameters: {
            operator: STARTS_WITH
            pattern: "^(feat|fix|test|docs|chore|refactor|perf|style|ci)(\\(.+\\))?!?: .+"
          }
        }
      ]
    }
  ) {
    ruleset {
      id
      name
    }
  }
}

# NOTE: File protection via push rules is not available for public repos.
# Use CODEOWNERS + branch protection instead (already configured).
# See: .github/RULESETS.md for details.

mutation CreateLinearHistoryRuleset($repositoryId: ID!) {
  createRepositoryRuleset(
    input: {
      repositoryId: $repositoryId
      name: "Linear History for main"
      description: "Enforce linear history on main branch (squash/rebase only)"
      enforcement: ACTIVE
      target: BRANCH
      bypassActors: []
      conditions: {
        refName: {
          include: ["refs/heads/main"]
          exclude: []
        }
      }
      rules: [
        {
          type: REQUIRED_LINEAR_HISTORY
        }
        {
          type: REQUIRED_PULL_REQUEST_REVIEWS
          parameters: {
            requiredApprovingReviewCount: 1
            dismissStaleOnPush: true
            requireCodeOwnerReview: false
          }
        }
      ]
    }
  ) {
    ruleset {
      id
      name
    }
  }
}
