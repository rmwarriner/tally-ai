name: Auto-approve doc/config changes

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-docs-only:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Check if PR only changes docs/config
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const files = response.data.map(f => f.filename);

            // Files that don't require code review
            const docPatterns = [
              /\.md$/,                    // *.md
              /^\.github\//,              // .github/**
              /^docs\//,                  // docs/**
              /^\.npmrc$/,                // .npmrc
              /^\.gitignore$/,            // .gitignore
              /^LICENSE$/,                // LICENSE
              /^package\.json$/,          // package.json
              /^pnpm-lock\.yaml$/,        // pnpm-lock.yaml
              /^Cargo\.lock$/,            // Cargo.lock
              /^\.husky\//,               // .husky/**
              /^\.prettierrc/,            // .prettierrc*
              /^\.eslintrc/,              // .eslintrc*
              /^tsconfig/,                // tsconfig*.json
            ];

            const docsOnly = files.every(file =>
              docPatterns.some(pattern => pattern.test(file))
            );

            core.info(`Files: ${files.join(', ')}`);
            core.info(`Docs only: ${docsOnly}`);
            core.setOutput('docs-only', docsOnly);

  auto-approve:
    needs: check-docs-only
    if: needs.check-docs-only.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Auto-approved: docs/config only'
            });

  label-docs:
    needs: check-docs-only
    if: needs.check-docs-only.outputs.docs-only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Add documentation label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['documentation']
            });
