name: Auto-Approve & Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  auto-approve-and-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      (github.actor == github.repository_owner || github.actor == 'dependabot[bot]' || github.actor == 'rmwarriner[bot]')

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const nodeId = context.payload.pull_request.node_id;
            await github.graphql(`
              mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number }
                }
              }
            `, { pullRequestId: nodeId });
            console.log('Auto-merge enabled for PR #' + context.payload.pull_request.number);
