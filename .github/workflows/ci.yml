name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-docs-only:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - name: Check if PR only changes docs/config
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const files = response.data.map(f => f.filename);

            const docPatterns = [
              /\.md$/,
              /^\.github\//,
              /^docs\//,
              /^terraform\//,
              /^scripts\//,
              /^\.npmrc$/,
              /^\.gitignore$/,
              /^LICENSE$/,
              /^package\.json$/,
              /^pnpm-lock\.yaml$/,
              /^Cargo\.lock$/,
              /^\.husky\//,
              /^\.prettierrc/,
              /^\.eslintrc/,
              /^tsconfig/,
            ];

            const docsOnly = files && files.every(file =>
              docPatterns.some(pattern => pattern.test(file))
            );

            core.setOutput('docs-only', docsOnly);

  test:
    needs: check-docs-only
    if: needs.check-docs-only.outputs.docs-only != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Show tool versions
        run: |
          node -v
          pnpm -v
          pnpm --filter @tally/core-types exec node -p "require('vitest/package.json').version"
          pnpm --filter @tally/core-types exec node -p "require('@vitest/coverage-v8/package.json').version"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  typecheck:
    needs: check-docs-only
    if: needs.check-docs-only.outputs.docs-only != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  rust-test:
    needs: check-docs-only
    if: needs.check-docs-only.outputs.docs-only != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libglib2.0-dev libgirepository1.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          save-if-changed: true

      - name: Run tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --all
        env:
          CARGO_INCREMENTAL: 1

      - name: Run clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all --all-targets -- -D warnings
        env:
          CARGO_INCREMENTAL: 1
