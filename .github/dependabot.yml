version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - rmwarriner
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # Rust dependencies
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - rmwarriner
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps-rust):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    reviewers:
      - rmwarriner
    labels:
      - ci
    commit-message:
      prefix: "ci(actions):"
